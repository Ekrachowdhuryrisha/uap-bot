<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Asia Pacific</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* =====================
           ROOT & RESET
        ===================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --uap-blue:    #003366;
            --uap-gold:    #c9a84c;
            --uap-light:   #f4f7fb;
            --chat-bg:     #ffffff;
            --chat-radius: 18px;
            --shadow:      0 8px 40px rgba(0,51,102,0.18);
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            color: #333;
            line-height: 1.6;
        }

        /* =====================
           HEADER
        ===================== */
        header {
            background-color: var(--uap-blue);
            color: #fff;
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 50px;
            border-radius: 6px;
        }

        .logo h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 0.3px;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 4px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        nav ul li a:hover {
            background: rgba(201,168,76,0.25);
            color: var(--uap-gold);
        }

        /* =====================
           BANNER
        ===================== */
        .banner {
            background: url('background.jpg') no-repeat center center / cover;
            min-height: 70vh;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =====================
           FOOTER
        ===================== */
        footer {
            background-color: var(--uap-blue);
            color: #fff;
            text-align: center;
            padding: 14px 0;
            font-size: 0.9rem;
        }

        /* ============================================================
           CHAT WIDGET
        ============================================================ */

        /* -- Floating bubble button -- */
        #chat-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 60px;
            height: 60px;
            background: var(--uap-blue);
            border: 3px solid var(--uap-gold);
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s, background 0.2s;
        }

        #chat-toggle:hover {
            transform: scale(1.1);
            background: #004080;
        }

        #chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        /* Notification dot */
        #chat-toggle::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 12px;
            height: 12px;
            background: var(--uap-gold);
            border-radius: 50%;
            border: 2px solid #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.4); opacity: 0.6; }
        }

        /* -- Chat window -- */
        #chat-window {
            position: fixed;
            bottom: 100px;
            right: 28px;
            width: 370px;
            max-width: calc(100vw - 40px);
            height: 520px;
            max-height: calc(100vh - 140px);
            background: var(--chat-bg);
            border-radius: var(--chat-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            border: 1.5px solid rgba(0,51,102,0.12);

            /* Hidden by default */
            opacity: 0;
            transform: translateY(30px) scale(0.97);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        #chat-window.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        /* -- Chat header -- */
        .chat-header {
            background: var(--uap-blue);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-avatar {
            width: 38px;
            height: 38px;
            background: var(--uap-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .chat-header-text h3 {
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Playfair Display', serif;
        }

        .chat-header-text span {
            color: var(--uap-gold);
            font-size: 0.75rem;
        }

        .chat-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 1.3rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .chat-close:hover { color: #fff; }

        /* -- Messages area -- */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--uap-light);
        }

        #chat-messages::-webkit-scrollbar { width: 5px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #c0c9d6; border-radius: 10px; }

        /* -- Individual message bubbles -- */
        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
            animation: msgIn 0.2s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg.bot {
            background: #fff;
            color: #222;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-left: 3px solid var(--uap-gold);
        }

        .msg.user {
            background: var(--uap-blue);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* -- Typing indicator -- */
        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 12px 14px;
            background: #fff;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-left: 3px solid var(--uap-gold);
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        /* -- Input area -- */
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid #e0e7ef;
            background: #fff;
            flex-shrink: 0;
        }

        #chat-input {
            flex: 1;
            border: 1.5px solid #dde3ec;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 0.88rem;
            font-family: 'Source Sans 3', sans-serif;
            outline: none;
            resize: none;
            max-height: 90px;
            overflow-y: auto;
            transition: border-color 0.2s;
        }

        #chat-input:focus {
            border-color: var(--uap-blue);
        }

        #chat-send {
            width: 42px;
            height: 42px;
            background: var(--uap-blue);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }

        #chat-send:hover {
            background: #004080;
            transform: scale(1.08);
        }

        #chat-send svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* =====================
           RESPONSIVE
        ===================== */
        @media (max-width: 768px) {
            header { padding: 10px 16px; flex-direction: column; align-items: flex-start; }
            nav ul { gap: 4px 2px; }
            nav ul li a { padding: 5px 10px; font-size: 0.85rem; }
            .logo h2 { font-size: 1rem; }
            #chat-window { width: calc(100vw - 20px); right: 10px; bottom: 90px; height: 460px; }
            #chat-toggle { right: 16px; bottom: 16px; }
        }

        @media (max-width: 480px) {
            .logo h2 { font-size: 0.88rem; }
            .logo img { height: 38px; }
            .banner { min-height: 35vh; }
        }

        @media (min-width: 1200px) {
            .logo img { height: 58px; }
            .logo h2 { font-size: 1.25rem; }
            .banner { min-height: 78vh; }
        }
    </style>
</head>
<body>

    <!-- ===================== HEADER ===================== -->
    <header>
        <div class="logo">
            <img src="uap_campus.png" alt="UAP Logo">
            <h2>University of Asia Pacific</h2>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#academics">Academics</a></li>
                <li><a href="#admission">Admission</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- ===================== BANNER ===================== -->
    <div class="banner"></div>

    <!-- ===================== FOOTER ===================== -->
    <footer>
        <p>&copy; 2025 University of Asia Pacific. All Rights Reserved.</p>
    </footer>


    <!-- ============================================================
         CHAT WIDGET
    ============================================================ -->

    <!-- Floating button -->
    <button id="chat-toggle" title="Chat with UAP Assistant">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4a2 2 0 00-2 2v13a2 2 0 002 2h4l4 4 4-4h4a2 2 0 002-2V4a2 2 0 00-2-2z"/>
        </svg>
    </button>

    <!-- Chat window -->
    <div id="chat-window">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 100 10A5 5 0 0012 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
                </div>
                <div class="chat-header-text">
                    <h3>UAP Assistant</h3>
                    
                </div>
            </div>
            <button class="chat-close" id="chat-close" title="Close">&times;</button>
        </div>

        <!-- Messages -->
        <div id="chat-messages">
            <div class="msg bot">Hello! I am the UAP AI Assistant. Ask me anything about the university.</div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
            <button id="chat-send" title="Send">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
            </button>
        </div>

    </div>


    <script>
        // ============================================================
        // CONFIGURATION — 
        // ============================================================
        const API_URL = "http://127.0.0.1:5000/chat"; 
    

        // ============================================================
        // TOGGLE CHAT OPEN / CLOSE
        // ============================================================
        const toggleBtn  = document.getElementById("chat-toggle");
        const chatWindow = document.getElementById("chat-window");
        const closeBtn   = document.getElementById("chat-close");

        toggleBtn.addEventListener("click", () => {
            chatWindow.classList.toggle("open");
            // Hide pulse dot once opened
            toggleBtn.style.setProperty("--dot-display", "none");
        });

        closeBtn.addEventListener("click", () => {
            chatWindow.classList.remove("open");
        });

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        const input    = document.getElementById("chat-input");
        const sendBtn  = document.getElementById("chat-send");
        const messages = document.getElementById("chat-messages");

        function appendMessage(text, role) {
            const div = document.createElement("div");
            div.className = "msg " + role;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const t = document.createElement("div");
            t.className = "typing-indicator";
            t.id = "typing";
            t.innerHTML = "<span></span><span></span><span></span>";
            messages.appendChild(t);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            input.value = "";
            input.style.height = "auto";
            showTyping();

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) throw new Error("Server error: " + res.status);

                const data = await res.json();
                hideTyping();
                appendMessage(data.response, "bot");

            } catch (err) {
                hideTyping();
                appendMessage("Sorry, I could not connect to the server. Please make sure your Colab is running.", "bot");
                console.error(err);
            }
        }

      
        sendBtn.addEventListener("click", sendMessage);

    
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        
        input.addEventListener("input", () => {
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 90) + "px";
        });
    </script>

</body>
</html>
